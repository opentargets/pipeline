[project]
name = "orchestration"
version = "1.0.0"
description = "Open Targets Data Pipeline Orchestration"
authors = [
  { name = "Open Targets Core Team", email = "devs@opentargets.net" },
  { name = "Szymon Szyszkowski", email = "ss60@sanger.ac.uk" },
]
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "apache-airflow-providers-google==14.1.0",
    "apache-airflow[apache-beam,async,celery,google]==2.10.5",
    "google==3.0.0",
    "pandas==2.1.4",
    "pyhocon==0.3.61",
    "pyyaml==6.0.2",
    "requests==2.32.3",
    "psycopg2-binary==2.9.10",
    "apache-airflow-providers-apache-beam==6.0.3",
]

[project.scripts]
orchestration = "orchestration:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["deptry==0.23.0", "pre-commit==4.2.0", "ruff==0.11.4"]

[project.optional-dependencies]
test = ["pytest==8.3.5"]

[tool.deptry]
pep621_dev_dependency_groups = ["test"]

[tool.deptry.per_rule_ignores]
DEP002 = ["psycopg2-binary"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["D", "I", "E"]
ignore = [
    "E501",    # Line too long
    "E731",    # Do not assign a lambda expression, use a def
    "PLC0208", # Use a sequence type instead of a `set` when iterating over values
    "PLR0911", # Too many return statements ({returns} > {max_returns})
    "PLR0912", # Too many branches ({branches} > {max_branches})
    "PLR0913", # Too many arguments to function call ({c_args} > {max_args})
    "PLR0915", # Too many statements ({statements} > {max_statements})
    "PLR2004", # Magic value used in comparison, consider replacing {value} with a constant variable
    "PLW2901", # Outer {outer_kind} variable {name} overwritten by inner {inner_kind} target
    "UP006",   # keep type annotation style as is
    "UP007",   # keep type annotation style as is
    "UP038",   # Use `X | Y` in `isinstance` call instead of `(X, Y)`
    "D107",    # Ignore missing docstring in __init__
    "D101",    # Missing docstring in public class
]

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"

[tool.ruff.lint.pydocstyle]
convention = "google"
ignore-decorators = [
    "airflow.decorators.task",                  # Don't require docstrings for Airflow tasks
    "airflow.decorators.task_group.task_group", # ^ for airflow task groups
]
