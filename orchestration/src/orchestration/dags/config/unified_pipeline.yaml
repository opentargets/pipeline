---
release_name: 'target_refactor'

# If `is_dev` is true:
#   * the bucket used for the run will be `open-targets-pipeline-runs`
#   * the prefix inside the bucket will be `run_name`
#         which defaults to a timestamp if not provided.
is_dev: true
run_name: 'ds/target_refactor'

# Whether this will be a partner preview platform release (PPP)
is_ppp: true

# Pipeline package versions
pis_version: 'v26.9.0.dev0.refactor-target.b0505da'
pts_version: 'v26.9.0.dev0.refactor-target.b0505da'
gentropy_version: '3.3.0-rc.1'
vep_version: 'release_115.2'

# Dependency graph
# ----------------
# Trimmed copy of unified_pipeline.yaml containing only pts_target and the
# four steps extracted from it (pts_transcript, pts_safety_liability,
# pts_target_tractability, pts_chemical_probes), plus their full transitive
# dependency closure. Used for local testing without needing to run the
# entire pipeline DAG.
#
# IMPORTANT: any dependency change has to be reflected here _manually_.
#
steps:
  # PIS STEPS
  pis_disease:
  pis_drug:
  pis_ontoma:
  pis_pharmacogenetics:
  pis_reactome:
  pis_target:

  # PTS STEPS
  pts_reactome:
    depends_on:
      - pis_reactome
  pts_disease:
    depends_on:
      - pis_disease
  pts_ontoma:
    depends_on:
      - pis_ontoma
      - pts_disease
  pts_chembl_molecule:
    depends_on:
      - pis_drug
  pts_drug_mechanism_of_action:
    depends_on:
      - pis_drug
      - pts_pre_target
  pts_pharmacogenetics:
    depends_on:
      - pis_pharmacogenetics
      - pts_ontoma
      - pts_chembl_molecule
      - pts_drug_mechanism_of_action
  pts_target_safety:
    depends_on:
      - pts_pharmacogenetics
  pts_pre_target:
    depends_on:
      - pis_target
  pts_target_gene_essentiality:
    depends_on:
      - pis_target

  pts_target:
    num_partitions: 10
    depends_on:
      - pts_pre_target
      - pts_reactome
      - pts_target_gene_essentiality

  # Steps extracted from pts_target
  pts_transcript:
    depends_on:
      - pts_pre_target
  pts_safety_liability:
    depends_on:
      - pts_target_safety
      - pts_target
      - pts_disease
  pts_target_tractability:
    depends_on:
      - pts_target
  pts_chemical_probes:
    depends_on:
      - pis_target
      - pts_chembl_molecule
      - pts_target
