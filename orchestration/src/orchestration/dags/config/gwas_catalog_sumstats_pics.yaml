---
environment_specs:
  - name: Prod
    vars:
      input_path: gs://gwas_catalog_inputs
      output_path: gs://gwas_catalog_sumstats_pics
      sync_date: '20260421'

env: Prod

dataproc:
  cluster_name: otg-gwascatalog-sumstats-pics
  cluster_config:
    project_id: open-targets-genetics-dev
    autoscaling_policy: otg-preprocess-gwascatalog
    metadata:
      GENTROPY_REF: v3.2.0
    num_workers: 5
    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'

nodes:
  - id: gwas_catalog_study_index
    kind: Task
    prerequisites: []
    params:
      step: gwas_catalog_study_index
      step.catalog_study_files:
        - "{input_path}/gentroutils/{sync_date}/gwas_catalog_download_studies.tsv"
      step.catalog_ancestry_files:
        - "{input_path}/gentroutils/{sync_date}/gwas_catalog_download_ancestries.tsv"
      step.study_index_path: "{output_path}/study_index"
      step.session.write_mode: overwrite
      step.session.output_partitions: 1

  - id: window_based_clumping
    kind: Task
    prerequisites: []
    params:
      step: window_based_clumping
      step.summary_statistics_input_path: "{input_path}/harmonised_summary_statistics"
      step.study_locus_output_path: "{output_path}/study_locus_window_based_clumped"
      step.session.write_mode: overwrite
      # yamllint disable rule:line-length
      +step.session.extended_spark_conf: "{spark.executor.memory: '25g', spark.executor.cores: '4', spark.shuffle.mapOutput.minSizeForBroadcast: '20m'}"
      # yamllint enable rule:line-length
  - id: ld_based_clumping
    kind: Task
    prerequisites:
      - window_based_clumping
    params:
      step: ld_based_clumping
      step.ld_index_path: gs://gnomad_data_2/v2.1.1/ld_index
      step.study_locus_input_path: "{output_path}/study_locus_window_based_clumped"
      step.clumped_study_locus_output_path: "{output_path}/study_locus_ld_clumped"
      step.study_index_path: "{output_path}/study_index"
      step.session.write_mode: overwrite
      # yamllint disable rule:line-length
      +step.session.extended_spark_conf: "{spark.executor.memory: '25g', spark.executor.cores: '4', spark.shuffle.mapOutput.minSizeForBroadcast: '20m'}"
      # yamllint enable rule:line-length
  - id: pics
    kind: Task
    prerequisites:
      - ld_based_clumping
    params:
      step: pics
      step.study_locus_ld_annotated_in: "{output_path}/study_locus_ld_clumped"
      step.picsed_study_locus_out: "{output_path}/credible_sets"
      step.session.write_mode: overwrite
