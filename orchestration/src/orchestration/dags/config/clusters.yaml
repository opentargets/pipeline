---
clusters:
  pts:
    image_version: '2.3'
    num_masters: 1
    num_workers: 2
    autoscaling_policy: otg-etl-25-secondary
    worker_machine_type: n1-standard-8
    master_disk_size: 512
    worker_disk_size: 128
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
    properties:
      'spark:spark.sql.adaptive.enabled': 'true'
      # Spark NLP fat jar (required by OnToma steps). Loaded via spark.jars from
      # the version-pinned jar orchestration pre-stages in the pipelines bucket,
      # instead of spark.jars.packages which re-runs Ivy resolution against Maven
      # Central on every spark-submit. See opentargets/issues#4453.
      'spark:spark.jars': 'gs://opentargets-pipelines/up/pts/jars/spark-nlp-assembly-{{spark_nlp_version}}.jar'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

  gentropy:
    image_version: '2.2'
    autoscaling_policy: otg-etl
    num_masters: 1
    num_workers: 2
    worker_machine_type: 'n1-highmem-16'
    idle_delete_ttl: 360
    internal_ip_only: false
    metadata:
      GENTROPY_REF: 'v{{gentropy_version}}'
    properties:
      'spark:spark.shuffle.service.enabled': 'true'
      'spark:spark.sql.adaptive.enabled': 'true'
      'core:fs.gs.requester.pays.mode': 'AUTO'
      'core:fs.gs.requester.pays.project.id': '{{requester_pays_project_id}}'
    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'
    # The `fetch_secrets.sh` is build at runtime and pushed to GCS. It will
    # store the secret variables into `/var/run/secrets/secret_name.json` files.
    # The files are accessible via the master node.
    secret_init_action_uri: 'gs://opentargets-pipelines/up/gentropy/fetch_secrets.sh'
    # Secrets to be fetched by secret_init_action_uri and made available as files in the cluster.
    secret_map:
      # this results in /var/run/secrets/hfhub-key.json with {"HF_TOKEN": "hfhub-key_value"} as content
      HF_TOKEN: hfhub-key
      # this results in /var/run/secrets/wandb-key.json with {"WANDB_API_KEY": "wandb-key_value"} as content
      WANDB_API_KEY: wandb-key

  gentropy_colocalisation:
    image_version: '2.2'
    zone: 'europe-west1-b'
    # Fixed non-preemptible primary pool (no autoscaling, no spot secondaries).
    # Spot-worker churn was the dominant failure source at baseline (3,021
    # ExecutorLostFailure); a fixed on-demand pool removes preemption entirely.
    num_masters: 3
    num_workers: 32
    master_machine_type: n1-highmem-16
    # n2d-highmem-32 = 32 vCPU / 256 GB. Packs 8 executors/node at cores=4,
    # 22g heap + 4g overhead each (8 x 26 = 208 GB), leaving ~48 GB for the OS
    # and YARN -- packing that n1-highmem-32 (208 GB) cannot fit. Executor sizing
    # itself comes from the colocalisation step's extended_spark_conf in gentropy.yaml.
    worker_machine_type: n2d-highmem-32
    worker_disk_type: 'pd-ssd'
    worker_disk_size: 1024
    internal_ip_only: false
    metadata:
      GENTROPY_REF: 'v3.3.0-dev.56'
    properties:
      # EFM and the spot-era band-aids (shuffle.io retries, extended network
      # timeout, speculation) are gone: with no preemption there is no shuffle to
      # reconstruct and no straggler-from-preemption to speculate around.
      'spark:spark.stage.maxConsecutiveAttempts': '10'
      'spark:spark.sql.adaptive.enabled': 'true'
      'spark:spark.sql.adaptive.skewJoin.enabled': 'true'
      # 8000 (not 4000): the fused agg + parquet-write stage is the residual exit-143
      # OOM source -- 4 tasks/executor each holding multi-GB on-heap agg + off-heap
      # fetch/write buffers occasionally overran the container. Halving per-task data
      # (8000 parts) cut those losses ~80% (535 -> 108) at no wall-clock cost.
      'spark:spark.sql.shuffle.partitions': '8000'
      'spark:spark.sql.files.maxPartitionBytes': '268435456'
      'spark:spark.task.maxFailures': '10'

    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'
    idle_delete_ttl: 1800

  pts_openfda:
    image_version: '2.2'
    num_masters: 1
    num_workers: 2
    autoscaling_policy: otg-etl-25-secondary
    worker_machine_type: n1-standard-8
    master_disk_size: 512
    worker_disk_size: 128
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

  pts_association:
    image_version: '2.2'
    num_masters: 1
    num_workers: 2
    autoscaling_policy: otg-etl-25-secondary
    worker_machine_type: n2d-highmem-32
    master_disk_size: 512
    worker_disk_size: 256
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
    properties:
      'spark:spark.sql.shuffle.partitions': '2000'
      'spark:spark.sql.adaptive.advisoryPartitionSizeInBytes': '64MB'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

  pts_literature:
    image_version: '2.2'
    num_masters: 1
    num_workers: 4
    master_machine_type: n1-standard-8
    master_disk_size: 512
    worker_machine_type: n1-highmem-16
    worker_disk_size: 256
    # num_preemptible_workers > 0 is required for Airflow's ClusterGenerator to
    # emit a secondary_worker_config block; without it, `preemptibility` is
    # silently dropped and autoscaled secondaries default to PREEMPTIBLE.
    num_preemptible_workers: 1
    preemptibility: NON_PREEMPTIBLE
    autoscaling_policy: pts-literature-50-secondary
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
    properties:
      # Cluster-wide knobs (apply to all 6 pts_literature_* steps).
      # Sized for the autoscaled 4xn1-highmem-16 + up to 50 non-preemptible
      # secondary cluster (~864 vCPU peak), validated on PTS runs 014-016.
      'spark:spark.sql.autoBroadcastJoinThreshold': '134217728'
      'spark:spark.shuffle.io.maxRetries': '10'
      'spark:spark.shuffle.io.retryWait': '15s'
      'spark:spark.network.timeout': '300s'
      'spark:spark.reducer.maxBlocksInFlightPerAddress': '128'
      # Spark NLP fat jar, pre-staged by orchestration and loaded via spark.jars
      # (not spark.jars.packages) to avoid per-job Ivy resolution against Maven
      # Central. See opentargets/issues#4453.
      'spark:spark.jars': 'gs://opentargets-pipelines/up/pts/jars/spark-nlp-assembly-{{spark_nlp_version}}.jar'
      'spark:spark.sql.adaptive.enabled': 'true'
      'spark:spark.serializer': 'org.apache.spark.serializer.KryoSerializer'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

step_job_properties:
  gentropy:
    'spark.jars': '/opt/conda/miniconda3/lib/python3.11/site-packages/hail/backend/hail-all-spark.jar'
    'spark.driver.extraClassPath': '/opt/conda/miniconda3/lib/python3.11/site-packages/hail/backend/hail-all-spark.jar'
    'spark.executor.extraClassPath': './hail-all-spark.jar'
    'spark.serializer': 'org.apache.spark.serializer.KryoSerializer'
    'spark.kryo.registrator': 'is.hail.kryo.HailKryoRegistrator'
