---
clusters:
  pts:
    image_version: '2.3'
    num_masters: 1
    num_workers: 0 # single-node mode
    master_machine_type: n1-standard-32
    master_disk_size: 128
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
    properties:
      # Configuration optimized for single node workloads.
      # These yarn settings are set to increase the max allocations per executor for yarn
      'yarn:yarn.scheduler.maximum-allocation-mb': '25296'
      'yarn:yarn.nodemanager.resource.memory-mb': '25296'
      'yarn:yarn.scheduler.maximum-allocation-vcores': '10'
      'yarn:yarn.nodemanager.resource.cpu-vcores': '10'

      # (5 executors + 1 driver) x 5 cores = 30 cores in total
      # Each node has 15G + 1.5G overhead = 16.5G memory
      # 6 x 16.5G = 99G memory in total which leaves 20G for OS
      'spark:spark.executor.memory': '14894m'
      'spark:spark.executor.cores': '5'
      'spark:spark.memory.fraction': '0.6'
      'spark:spark.offHeap.size': '0'
      'spark:spark.driver.memory': '14894m'
      'spark:spark.driver.cores': '5'
      'spark:spark.executor.memoryOverheadFactor': '0.1'

      # Scale at most to 6 executors when dynamically resizing the job
      'spark:spark.dynamicAllocation.enabled': 'true'
      'spark:spark.dynamicAllocation.maxExecutors': '6'
      'spark:spark.sql.adaptive.enabled': 'true'

      # 0.5 of the executor memory is allocated for storage
      'spark:spark.memory.storageFraction': '0.5'
      'spark:spark.serializer': 'org.apache.spark.serializer.KryoSerializer'

      # Faster garbage collection
      'spark:spark.executor.extraJavaOptions': '-XX:+UseG1GC'

      # Spark NLP package
      'spark:spark.jars.packages': 'com.johnsnowlabs.nlp:spark-nlp_2.12:6.1.3'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

  etl:
    image_version: '2.2'
    num_masters: 1
    num_workers: 2
    autoscaling_policy: otg-etl-25-secondary
    worker_machine_type: n1-standard-8
    worker_disk_size: 512

  etl_literature:
    image_version: '2.2'
    num_masters: 1
    num_workers: 4
    worker_machine_type: n2d-highmem-64
    properties:
      'spark:spark.driver.memory': '478g'
      'spark:spark.sql.shuffle.partitions': '20'

  gentropy:
    image_version: '2.2'
    autoscaling_policy: otg-etl
    num_masters: 1
    num_workers: 2
    worker_machine_type: 'n1-highmem-16'
    idle_delete_ttl: 360
    internal_ip_only: false
    metadata:
      GENTROPY_REF: 'v{{gentropy_version}}'
    properties:
      'spark:spark.shuffle.service.enabled': 'true'
      'spark:spark.sql.adaptive.enabled': 'true'
      'core:fs.gs.requester.pays.mode': 'AUTO'
      'core:fs.gs.requester.pays.project.id': '{{requester_pays_project_id}}'
    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'

  gentropy_colocalisation:
    image_version: '2.2'
    zone: 'europe-west1-b'
    autoscaling_policy: otg-efm
    num_masters: 3
    num_workers: 20
    master_machine_type: n1-highmem-16
    worker_machine_type: n1-highmem-32
    worker_disk_type: 'pd-ssd'
    worker_disk_size: 1024
    secondary_worker_disk_size: 100
    secondary_worker_disk_type: 'pd-standard'
    internal_ip_only: false
    metadata:
      GENTROPY_REF: 'v{{gentropy_version}}'
    properties:
      'dataproc:efm.spark.shuffle': 'primary-worker'
      'spark:spark.shuffle.io.numConnectionsPerPeer': '5'
      'spark:spark.shuffle.io.maxRetries': '15'
      'spark:spark.shuffle.io.retryWait': '30s'
      'spark:spark.shuffle.io.serverThreads': '100'
      'spark:spark.stage.maxConsecutiveAttempts': '10'
      'spark:spark.sql.adaptive.enabled': 'true'
      'spark:spark.sql.shuffle.partitions': '2000'
      'spark:spark.sql.files.maxPartitionBytes': '268435456'
      'spark:spark.network.timeout': '800s'
      'spark:spark.task.maxFailures': '15'
      'yarn:spark.shuffle.io.serverThreads': '100'
      # Speculative execution -> https://kb.databricks.com/scala/understanding-speculative-execution
      'spark:spark.speculation': 'true'
      'spark:spark.speculation.multiplier': '1.5'
      'spark:spark.speculation.quantile': '0.9'

    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'
    idle_delete_ttl: 1800

  pts_association:
    image_version: '2.2'
    num_masters: 1
    num_workers: 2
    worker_machine_type: n2d-standard-16
    master_disk_size: 128
    worker_disk_size: 128
    idle_delete_ttl: 3600
    internal_ip_only: false
    metadata:
      PTS_REF: 'v{{pts_version}}'
      # Each n1-standard-16 worker has ~60 GB RAM and 16 cores.
      # Reserving 1 core and ~4 GB for YARN/OS overhead leaves ~56 GB and 15 cores per worker.
      # With 5 cores per executor, that's 3 executors per worker node × 2 workers = 6 max,
      # but keeping it at 4 initial executors (2 per node) with ~18 GB each leaves comfortable headroom and avoids excessive GC pressure.
    properties:
      # ── Driver Configuration ──
      'spark:spark.driver.memory': '18g'
      'spark:spark.driver.memoryOverhead': '2g'
      'spark:spark.driver.cores': '5'

      # ── Executor Configuration ──
      'spark:spark.executor.instances': '4'
      'spark:spark.executor.cores': '5'
      'spark:spark.executor.memory': '18g'
      'spark:spark.executor.memoryOverhead': '2g'

      # ── Parallelism & Partitions ──
      'spark:spark.default.parallelism': '40'
      # The probable output sizes range between 600MiB to 2GiB so partition should be around max 100 MiB
      # including the overhead of multiple compressed files.
      # FIXME: This is a temporary setting to reduce the partition number for the association step.
      'spark:spark.sql.shuffle.partitions': '25'

      # ── Dynamic Allocation ──
      'spark:spark.dynamicAllocation.enabled': 'true'

      # ── Memory Management ──
      'spark:spark.memory.fraction': '0.6'
      'spark:spark.memory.storageFraction': '0.5'

      # ── Shuffle & Compression ──
      'spark:spark.shuffle.compress': 'true'
      'spark:spark.shuffle.spill.compress': 'true'
      'spark:spark.io.compression.codec': 'snappy'

      # ── Serialization ──
      'spark:spark.serializer': 'org.apache.spark.serializer.KryoSerializer'

      # ── Adaptive Query Execution (Spark 3.x) ──
      'spark:spark.sql.adaptive.enabled': 'true'
      'spark:spark.sql.adaptive.coalescePartitions.enabled': 'true'
      'spark:spark.sql.adaptive.skewJoin.enabled': 'true'
    init_actions_uris:
      - 'gs://opentargets-pipelines/up/pts/install_dependencies_on_cluster.sh'

step_job_properties:
  etl:
    'spark.executor.extraJavaOptions': '-Dconfig.file={{config_filename}} -XX:MaxPermSize=512m -XX:+UseCompressedOops'
    'spark.driver.extraJavaOptions': '-Dconfig.file={{config_filename}} -XX:MaxPermSize=512m -XX:+UseCompressedOops'
    'spark.sql.shuffle.partitions': '{{num_partitions}}'

  gentropy:
    'spark.jars': '/opt/conda/miniconda3/lib/python3.11/site-packages/hail/backend/hail-all-spark.jar'
    'spark.driver.extraClassPath': '/opt/conda/miniconda3/lib/python3.11/site-packages/hail/backend/hail-all-spark.jar'
    'spark.executor.extraClassPath': './hail-all-spark.jar'
    'spark.serializer': 'org.apache.spark.serializer.KryoSerializer'
    'spark.kryo.registrator': 'is.hail.kryo.HailKryoRegistrator'
