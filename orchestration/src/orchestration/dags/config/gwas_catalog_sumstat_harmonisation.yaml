---
environment_specs:
  - name: Test
    vars:
      root_path: gs://ot_orchestration/test/gwas_catalog_harmonisation/gwas_catalog_inputs
      GENTROPY_REF: 3.2.0
  - name: Prod
    vars:
      root_path: gs://gwas_catalog_inputs
      GENTROPY_REF: 3.2.0

env: Prod

nodes:
  - id: generate_sumstat_index
    kind: Task
    prerequisites: []
    google_batch_index_specs:
      pointer: harmonisation
      max_task_count: 1000
      generator_specs:
        generator_options:
          qc_output_pattern: '{root_path}/summary_statistics_qc/**_SUCCESS'
          harm_output_pattern: '{root_path}/harmonised_summary_statistics/**_SUCCESS'
          raw_input_pattern: '{root_path}/raw_summary_statistics/**.h.tsv.gz'
          manifest_output_uri: '{root_path}/harmonisation_manifest.csv'

  - id: gwas_catalog_harmonisation
    kind: Task
    prerequisites:
      - generate_sumstat_index
    google_batch:
      job:
        task_group:
          parallelism: 200
          task_environments:
            environments: [] # populated at runtime by BatchIndexOperator
          task_config:
            max_retry_count: 2
            max_run_duration: "1h"
            instance_resource_spec:
              cpu_milli: 4000
              memory_mib: 8000
              boot_disk_mib: 8000
            runnable_spec:
              image_uri: 'ghcr.io/opentargets/gentropy:{GENTROPY_REF}'
              entrypoint: /usr/bin/bash
              script_file: harmonise.sh
        allocation:
          instance:
            machine_type: n1-standard-4
            provisioning_model: SPOT
        logs: {}
