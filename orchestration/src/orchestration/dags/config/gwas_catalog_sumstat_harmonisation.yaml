---
environment_specs:
  - name: Test
    vars:
      root_path: gs://ot_orchestration/test/gwas_catalog_inputs
  - name: Prod
    vars:
      root_path: gs://gwas_catalog_inputs

env: Prod

nodes:
  - id: generate_sumstat_index
    kind: Task
    prerequisites: []
    google_batch_index_specs:
      manifest_generator_label: gwas_catalog_harmonisation
      max_task_count: 1000
      manifest_generator_specs:
        commands:
          - -c
          - ./harmonise-sumstats.sh
          - $RAW
          - $HARMONISED
          - $QC
          - 1.0e-8
        options:
        manifest_kwargs:
          qc_output_pattern: '{root_path}/summary_statistics_qc/**_SUCCESS'
          harm_output_pattern: '{root_path}/harmonised_summary_statistics/**_SUCCESS'
          raw_input_pattern: '{root_path}/raw_summary_statistics/**.h.tsv.gz'
          manifest_output_uri: '{root_path}/harmonisation_manifest.csv'

  - id: gwas_catalog_harmonisation
    kind: Task
    prerequisites:
      - generate_sumstat_index
    google_batch:
      entrypoint: /usr/bin/bash
      parallelism: 200
      image: ghcr.io/opentargets/orchestration-harmonisation:25.12-staging.5
      resource_specs:
        cpu_milli: 4000
        memory_mib: 8000
        boot_disk_mib: 8000
      task_specs:
        max_retry_count: 2
        max_run_duration: "1h"
      policy_specs:
        machine_type: n1-standard-4
