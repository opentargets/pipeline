---
environment_specs:
  - name: Prod
    vars:
      data_bucket: "gs://finngen_ukb_meta_data/r12"
      source_base: "gs://finngen-public-data-r12/meta_analysis/ukbb"
      curation_date: "26.05"
      # yamllint disable rule:line-length
      conversion_spark_conf: "{spark.scheduler.mode: 'FAIR', spark.sql.files.maxPartitionBytes: '256m', spark.executor.memory: '32g', spark.executor.memoryOverhead: '6g', spark.executor.cores: '5', spark.driver.memory: '16g'}"
      harmonisation_spark_conf: "{spark.sql.shuffle.partitions: '20000', spark.sql.adaptive.enabled: 'true', spark.sql.adaptive.coalescePartitions.enabled: 'true', spark.sql.adaptive.advisoryPartitionSizeInBytes: '128m', spark.sql.adaptive.skewJoin.enabled: 'true', spark.executor.memory: '48g', spark.executor.memoryOverhead: '8g', spark.executor.cores: '5', spark.driver.memory: '16g', spark.driver.maxResultSize: '0', spark.sql.broadcastTimeout: '3000', spark.shuffle.service.enabled: 'true'}"
      qc_spark_conf: "{spark.sql.shuffle.partitions: '20000', spark.sql.adaptive.enabled: 'true', spark.sql.adaptive.coalescePartitions.enabled: 'true', spark.sql.adaptive.advisoryPartitionSizeInBytes: '128m', spark.executor.memory: '32g', spark.executor.memoryOverhead: '6g', spark.executor.cores: '5', spark.driver.memory: '16g'}"
      clumping_spark_conf: "{spark.executor.memory: '25g', spark.executor.memoryOverhead: '4g', spark.executor.cores: '4', spark.shuffle.mapOutput.minSizeForBroadcast: '10m'}"
      # yamllint enable rule:line-length
  - name: Test
    vars:
      data_bucket: "gs://ot_orchestration/test/finngen_meta/two_way_output"
      source_base: "gs://ot_orchestration/test/finngen_meta/meta_analysis/ukbb"
      curation_date: "26.05"
      # Spark conf sized for the 2-worker test cluster (YARN max ~12 GB per executor)
      # yamllint disable rule:line-length
      conversion_spark_conf: "{spark.scheduler.mode: 'FAIR', spark.sql.files.maxPartitionBytes: '256m', spark.executor.memory: '8g', spark.executor.memoryOverhead: '2g', spark.executor.cores: '4', spark.driver.memory: '8g'}"
      harmonisation_spark_conf: "{spark.sql.shuffle.partitions: '200', spark.sql.adaptive.enabled: 'true', spark.sql.adaptive.coalescePartitions.enabled: 'true', spark.sql.adaptive.advisoryPartitionSizeInBytes: '128m', spark.sql.adaptive.skewJoin.enabled: 'true', spark.executor.memory: '8g', spark.executor.memoryOverhead: '2g', spark.executor.cores: '4', spark.driver.memory: '8g'}"
      qc_spark_conf: "{spark.sql.shuffle.partitions: '200', spark.sql.adaptive.enabled: 'true', spark.sql.adaptive.coalescePartitions.enabled: 'true', spark.sql.adaptive.advisoryPartitionSizeInBytes: '128m', spark.executor.memory: '8g', spark.executor.memoryOverhead: '2g', spark.executor.cores: '4', spark.driver.memory: '8g'}"
      clumping_spark_conf: "{spark.executor.memory: '8g', spark.executor.memoryOverhead: '2g', spark.executor.cores: '4', spark.shuffle.mapOutput.minSizeForBroadcast: '10m'}"
      # yamllint enable rule:line-length

env: Test

dataproc:
  cluster_name: otg-finngen-ukb-two-way
  cluster_config:
    project_id: open-targets-genetics-dev
    autoscaling_policy: otg-etl
    num_workers: 2
    metadata:
      GENTROPY_REF: v3.3.0-dev.58
    init_actions_uris:
      - 'gs://genetics_etl_python_playground/initialisation/install_dependencies_on_cluster.sh'
    properties:
      "spark:spark.jars.packages": "org.seqdoop:hadoop-bam:7.10.0"

nodes:
  - id: study_index
    prerequisites: []
    params:
      step: finngen_meta_study_index
      # inputs
      step.manifest_path: "{source_base}/finngen_R12_meta_analysis_mapping_with_definitions.tsv"
      step.efo_curation_path: "https://raw.githubusercontent.com/opentargets/curation/refs/tags/{curation_date}/mappings/disease/manual_string.tsv"
      # output
      step.study_index_output_path: "{data_bucket}/study_index/"
      # config
      step.meta_analysis_type: "two_way"
      step.finngen_release: "R12"
      # session config
      step.session.write_mode: overwrite

  - id: sumstat_conversion
    prerequisites: [study_index]
    params:
      step: finngen_ukb_meta_sumstat_conversion
      # input
      step.summary_statistics_glob: "{source_base}/summary_stats/*.gz"
      # output
      step.raw_summary_statistics_output_path: "{data_bucket}/raw_summary_statistics/"
      # session config
      step.session.write_mode: overwrite
      step.session.use_enhanced_bgzip_codec: true
      +step.session.extended_spark_conf: "{conversion_spark_conf}"

  - id: sumstat_harmonisation
    prerequisites: [sumstat_conversion]
    params:
      step: finngen_ukb_meta_sumstat_harmonisation
      # inputs
      step.meta_analysis_study_index_path: "{data_bucket}/study_index/"
      step.variant_direction_path: "gs://gnomad_data_2/v4.1/variant_direction/"
      step.raw_summary_statistics_output_path: "{data_bucket}/raw_summary_statistics/"
      # output
      step.harmonised_summary_statistics_output_path: "{data_bucket}/harmonised_summary_statistics/"
      # harmonisation config (no imputation score filter — two-way data has no INFO column)
      step.perform_meta_analysis_filter: true
      step.min_allele_count_threshold: 20
      step.perform_min_allele_count_filter: true
      step.min_allele_frequency_threshold: 0.0001
      step.perform_min_allele_frequency_filter: false
      step.perform_samples_size_filter: false
      step.sample_size_threshold: 1000
      step.remove_ambiguous_alleles: false
      step.verify_atgc: true
      step.remove_monomorphic_alleles: true
      # session config
      step.session.write_mode: overwrite
      +step.session.extended_spark_conf: "{harmonisation_spark_conf}"

  - id: study_index_qc_annotation
    prerequisites: [sumstat_harmonisation]
    params:
      step: finngen_meta_study_index_qc_annotation
      # inputs
      step.study_index_output_path: "{data_bucket}/study_index/"
      step.harmonised_summary_statistics_output_path: "{data_bucket}/harmonised_summary_statistics/"
      # outputs
      step.harmonised_summary_statistics_qc_output_path: "{data_bucket}/harmonised_summary_statistics_qc/"
      step.study_index_with_qc_output_path: "{data_bucket}/study_index_with_qc/"
      # session config
      step.session.write_mode: overwrite
      step.qc_threshold: 1e-8
      +step.session.extended_spark_conf: "{qc_spark_conf}"

  - id: window_based_clumping
    prerequisites: [study_index_qc_annotation]
    params:
      step: window_based_clumping
      # input
      step.summary_statistics_input_path: "{data_bucket}/harmonised_summary_statistics"
      # output
      step.study_locus_output_path: "{data_bucket}/study_locus_window_based_clumped"
      # session config
      step.session.write_mode: overwrite
      step.distance: 500000
      step.collect_locus: false
      step.recursive_file_lookup: false
      step.gwas_significance: 1e-8
      +step.session.extended_spark_conf: "{clumping_spark_conf}"

  - id: ld_based_clumping
    prerequisites: [window_based_clumping]
    params:
      step: ld_based_clumping
      # input
      step.ld_index_path: gs://gnomad_data_2/v2.1.1/ld_index
      step.study_locus_input_path: "{data_bucket}/study_locus_window_based_clumped"
      step.study_index_path: "{data_bucket}/study_index_with_qc"
      # output
      step.clumped_study_locus_output_path: "{data_bucket}/study_locus_ld_clumped"
      # session config
      step.session.write_mode: overwrite
      +step.session.extended_spark_conf: "{clumping_spark_conf}"

  - id: pics
    prerequisites: [ld_based_clumping]
    params:
      step: pics
      # input
      step.study_locus_ld_annotated_in: "{data_bucket}/study_locus_ld_clumped"
      # output
      step.picsed_study_locus_out: "{data_bucket}/credible_sets"
      # session config
      step.session.write_mode: overwrite
