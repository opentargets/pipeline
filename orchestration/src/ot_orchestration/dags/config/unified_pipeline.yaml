---
release_name: uo_test_paths

pis_version: '25.0.0-rc.1'
ontoform_version: '25.0.0-rc.5'
etl_version: '25.0.0-rc.2'
gentropy_version: '2.0.1'
vep_version: '2.0.1'

chembl_version: '35'
efo_version: '3.71.0'
ensembl_version: '113'
l2g_training: '2025-02'

is_ppp: false

# Dependency graph
# ----------------
# The following section defines the dependencies between the different steps in
# the pipeline.
#
# IMPORTANT: any dependency change has to be reflected here _manually_.
#
# IMPORTANT: only direct dependencies are defined. Take care when removing one,
#      and always double check if instead of just deleting, you have to change
#      it for another step that is further upstream.
#
# Note: steps that can run in parallel are separated in blocks by a blank line,
#      which means each block depends on the previous block.
#
# It could be possible to generate this automatically from the file input for
# each step, but given the current fast pace of changes throughout the whole
# pipeline, it is not worth the effort to implement this until things have
# stabilised.
#
steps:
  # PIS STEPS
  pis_biosample:
  pis_disease:
  pis_drug:
  pis_evidence:
  pis_evidence_ppp:
    ppp_only: true
  pis_expression:
  pis_go:
  pis_l2g_gold_standard:
  pis_interaction:
  pis_literature:
  pis_openfda:
  pis_otar:
    ppp_only: true
  pis_pharmacogenomics:
  pis_reactome:
  pis_so:
  pis_target:
  pis_target_engine:
  pis_target_validation:

  # ONTOFORM STEPS
  ontoform_disease:
    depends_on:
      - pis_disease
  ontoform_expression:
    depends_on:
      - pis_expression
  ontoform_target:
    depends_on:
      - pis_target
  ontoform_openfda:
    depends_on:
      - pis_openfda
  ontoform_so:
    depends_on:
      - pis_so

  # ETL STEPS
  etl_expression:
    depends_on:
      - ontoform_expression
  etl_go:
    depends_on:
      - pis_go
  etl_reactome:
    depends_on:
      - pis_reactome

  etl_otar:
    ppp_only: true
    depends_on:
      - pis_otar
      - ontoform_disease
  etl_target:
    depends_on:
      - ontoform_target
      - etl_reactome

  etl_drug:
    depends_on:
      - pis_drug
      - ontoform_disease
      - etl_target
  etl_search_facet:
    depends_on:
      - ontoform_disease
      - etl_go
      - etl_target
  etl_interaction:
    depends_on:
      - pis_interaction
      - etl_target
  etl_target_validation:
    depends_on:
      - etl_target
      - pis_target_validation

  etl_openfda:
    depends_on:
      - ontoform_openfda
      - etl_drug
  etl_literature:
    depends_on:
      - pis_literature
      - etl_drug
  etl_pharmacogenomics:
    depends_on:
      - pis_pharmacogenomics
      - etl_drug
  etl_target_engine:
    depends_on:
      - pis_target_engine
      - etl_drug

  etl_evidence:
    depends_on:
      - pis_evidence
      - etl_literature
      - gentropy_l2g_evidence
    depends_on_ppp:
      - pis_evidence_ppp

  etl_association:
    depends_on:
      - etl_evidence
  etl_association_otf:
    depends_on:
      - etl_evidence
  etl_known_drug:
    depends_on:
      - etl_evidence

  etl_search:
    depends_on:
      - etl_association
      - gentropy_variant
  etl_search_ebi:
    depends_on:
      - etl_association

  # GENTROPY STEPS
  gentropy_biosample:
    depends_on:
      - pis_biosample

  gentropy_study:
    depends_on:
      - ontoform_target
      - ontoform_disease
      - etl_target
      - gentropy_biosample

  gentropy_credible_set:
    depends_on:
      - gentropy_study

  gentropy_variant_partition:
    depends_on:
      - pis_evidence
      - pis_pharmacogenomics
      - gentropy_credible_set

  gentropy_variant_annotation:
    depends_on:
      - gentropy_variant_partition

  gentropy_variant:
    depends_on:
      - gentropy_variant_annotation

  gentropy_colocalisation_coloc:
    depends_on:
      - gentropy_variant
  gentropy_colocalisation_ecaviar:
    depends_on:
      - gentropy_variant

  gentropy_l2g_feature_matrix:
    depends_on:
      - gentropy_colocalisation_coloc
      - gentropy_colocalisation_ecaviar
      - gentropy_variant

  gentropy_l2g_training:
    depends_on:
      - gentropy_credible_set
      - gentropy_variant
      - gentropy_l2g_feature_matrix
      - pis_l2g_gold_standard
      - etl_interaction

  gentropy_l2g_prediction:
    depends_on:
      - gentropy_l2g_feature_matrix
      - gentropy_l2g_training

  gentropy_l2g_evidence:
    depends_on:
      - gentropy_l2g_prediction
