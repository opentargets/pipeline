---
dataproc:
  python_main_module: gs://genetics_etl_python_playground/initialisation/gentropy/dev/cli.py
  cluster_metadata:
    PACKAGE: gs://genetics_etl_python_playground/initialisation/gentropy/dev/gentropy-0.0.0-py3-none-any.whl
  cluster_init_script: gs://genetics_etl_python_playground/initialisation/gentropy/dev/install_dependencies_on_cluster.sh
  cluster_name: gnomad-preprocess
  autoscaling_policy: otg-etl
  allow_efm: false
  num_workers: 2

nodes:
  - id: ld_index
    kind: Task
    prerequisites: []
    params:
      step.ld_index_out: gs://genetics_etl_python_playground/static_assets/ld_index
      # The version will of the gnomad will be inferred from ld_matrix_template and appended to the ld_index_out.
      step.use_version_from_input: false
  - id: gnomad_variants
    kind: Task
    prerequisites: [ld_index]
    params:
      step: gnomad_variants
      step.variant_annotation_path: gs://genetics_etl_python_playground/static_assets/gnomad_variants
      step.use_version_from_input: false
